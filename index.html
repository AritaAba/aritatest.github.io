<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Color Word Match</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #fff8e7;
      --bg-mid: #e3f8ff;
      --bg-bot: #ffe8f3;
      --panel: #ffffff;
      --panel-edge: rgba(255, 182, 193, 0.55);
      --text: #2d3142;
      --muted: #5c6478;
      --accent: #ff6b9d;
      --accent-2: #6c9eff;
      --good: #2bbf7b;
      --bad: #ff5c7a;
      --tile-word-bg: #f7f9ff;
      --tile-border: rgba(45, 49, 66, 0.12);
      --shadow: 0 10px 40px rgba(255, 105, 180, 0.12), 0 4px 14px rgba(100, 160, 255, 0.08);
      --shadow-btn: 0 6px 0 #e8487a, 0 8px 20px rgba(255, 107, 157, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Fredoka", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(120% 80% at 10% 0%, rgba(255, 214, 165, 0.65) 0%, transparent 55%),
        radial-gradient(90% 70% at 90% 10%, rgba(186, 230, 253, 0.9) 0%, transparent 50%),
        radial-gradient(100% 60% at 50% 100%, rgba(255, 182, 221, 0.55) 0%, transparent 45%),
        linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bot) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.35rem 1rem 2rem;
    }

    h1 {
      font-weight: 700;
      font-size: clamp(1.5rem, 4.5vw, 2.05rem);
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
      background: linear-gradient(110deg, #ff6b9d 0%, #ffa94d 35%, #5ecbff 70%, #a78bfa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.8));
    }

    .sub {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 1.35rem;
      text-align: center;
      max-width: 31rem;
      line-height: 1.55;
    }

    .sub strong {
      color: var(--accent);
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .diff-group {
      display: flex;
      gap: 0.4rem;
      background: #fff;
      padding: 0.4rem;
      border-radius: 999px;
      box-shadow: var(--shadow);
      border: 2px solid var(--panel-edge);
    }

    .diff-group button {
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.18s, color 0.18s, transform 0.12s;
    }

    .diff-group button.active {
      background: linear-gradient(135deg, #ff8fb8, #ff6b9d);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 107, 157, 0.35);
    }

    .diff-group button:not(.active):hover {
      color: var(--text);
      background: rgba(108, 158, 255, 0.12);
    }

    .btn {
      border: none;
      padding: 0.55rem 1.2rem;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      background: linear-gradient(180deg, #7eb6ff 0%, var(--accent-2) 100%);
      color: #fff;
      box-shadow: 0 5px 0 #4a7ddb, 0 10px 24px rgba(74, 125, 219, 0.35);
      transition: transform 0.1s, box-shadow 0.1s, filter 0.15s;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #4a7ddb, 0 4px 14px rgba(74, 125, 219, 0.3);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .stats span {
      background: #fff;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 2px dashed rgba(108, 158, 255, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .stats strong {
      color: var(--good);
      font-weight: 700;
    }

    .board-wrap {
      background: var(--panel);
      padding: clamp(0.75rem, 2.2vw, 1.15rem);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 3px solid var(--panel-edge);
      transition: filter 0.35s ease, opacity 0.35s ease;
    }

    .board-wrap.dimmed {
      filter: saturate(0.65) brightness(0.92);
      opacity: 0.88;
      pointer-events: none;
    }

    .board {
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .cell {
      width: var(--cell, 64px);
      height: var(--cell, 64px);
      border-radius: 16px;
      border: 3px solid rgba(255, 255, 255, 0.65);
      background: #dfe3ef;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: clamp(0.62rem, 2.1vw, 0.88rem);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.06), 0 6px 14px rgba(0, 0, 0, 0.06);
      transition: transform 0.14s, box-shadow 0.14s, border-color 0.14s, opacity 0.25s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:hover:not(:disabled):not(.empty) {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.05), 0 14px 22px rgba(255, 107, 157, 0.18);
    }

    .cell.selected {
      border-color: #ffcf4d;
      box-shadow: 0 0 0 4px rgba(255, 207, 77, 0.55), 0 6px 0 rgba(0, 0, 0, 0.05);
      transform: scale(1.06);
    }

    .cell.word-tile {
      background: var(--tile-word-bg);
      color: var(--text);
      text-shadow: none;
      border-color: rgba(108, 158, 255, 0.35);
      letter-spacing: 0.02em;
      padding: 4px 5px;
      overflow: hidden;
      container-type: size;
      font-size: unset;
    }

    .cell.word-tile .word-label {
      display: block;
      width: 100%;
      max-width: 100%;
      max-height: 100%;
      margin: 0 auto;
      text-align: center;
      line-height: 1.08;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: auto;
      box-sizing: border-box;
      /* Fallback before JS adjusts px size */
      font-size: clamp(6px, 22cqmin, 13px);
    }

    .cell.shake {
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .cell.empty {
      visibility: hidden;
      pointer-events: none;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .toast {
      min-height: 1.5rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      text-align: center;
      color: var(--muted);
      font-weight: 500;
    }

    .toast.ok {
      color: #0d9f5e;
    }

    .toast.err {
      color: var(--bad);
    }

    /* Victory overlay */
    .victory-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(255, 250, 240, 0.82);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.45s ease, visibility 0.45s;
    }

    .victory-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .victory-card {
      position: relative;
      max-width: 22rem;
      width: 100%;
      padding: 2rem 1.75rem 1.75rem;
      border-radius: 28px;
      background: linear-gradient(165deg, #fff 0%, #fff5fb 40%, #e8f4ff 100%);
      border: 3px solid rgba(255, 182, 193, 0.75);
      box-shadow: 0 20px 60px rgba(255, 107, 157, 0.2), 0 0 0 6px rgba(255, 255, 255, 0.65) inset;
      text-align: center;
      transform: scale(0.5) translateY(40px);
      opacity: 0;
    }

    .victory-overlay.open .victory-card {
      animation: victoryPop 0.65s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    @keyframes victoryPop {
      0% {
        transform: scale(0.5) translateY(40px);
        opacity: 0;
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .victory-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.65rem;
      font-weight: 700;
      background: linear-gradient(95deg, #ff6b9d, #ffa94d, #5ecbff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 2s ease-in-out infinite;
    }

    @keyframes shine {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
    }

    .victory-attempts {
      margin: 1.25rem 0 1.5rem;
      font-size: 1.1rem;
      color: var(--muted);
    }

    .victory-attempts .num {
      display: block;
      margin-top: 0.35rem;
      font-size: 3rem;
      font-weight: 700;
      color: #1fb86e;
      line-height: 1;
      animation: countReveal 0.8s ease 0.35s both;
    }

    @keyframes countReveal {
      from {
        opacity: 0;
        transform: scale(0.3);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .victory-overlay.open .confetti {
      opacity: 1;
    }

    .confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .confetti span {
      position: absolute;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 3px;
      animation: fall linear forwards;
    }

    .victory-card .btn {
      background: linear-gradient(180deg, #ff9ec4 0%, #ff6b9d 100%);
      box-shadow: var(--shadow-btn);
    }

    .victory-card .btn:active {
      box-shadow: 0 3px 0 #e8487a, 0 6px 16px rgba(255, 107, 157, 0.35);
    }

    @keyframes fall {
      to {
        transform: translateY(420px) rotate(720deg);
        opacity: 0.85;
      }
    }

    @media (max-width: 420px) {
      .board {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <h1>Color Word Match</h1>
  <p class="sub">
    Tap a <strong>color</strong>, then its <strong>English word</strong> to clear the word. There are more color tiles than words—extra colors are decoys. Clear <strong>every word</strong> to win.
  </p>

  <div class="toolbar">
    <div class="diff-group" role="group" aria-label="Difficulty">
      <button type="button" id="diffEasy" class="active">Easy</button>
      <button type="button" id="diffHard">Hard</button>
    </div>
    <button type="button" class="btn" id="btnNew">New round</button>
    <div class="stats">
      <span>Words left: <strong id="wordsLeft">0</strong></span>
      <span>Attempts: <strong id="attempts">0</strong></span>
    </div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board" aria-live="polite"></div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <div class="victory-overlay" id="victoryOverlay" aria-hidden="true">
    <div class="victory-card" role="dialog" aria-labelledby="victoryTitle" aria-modal="true">
      <div class="confetti" id="confetti" aria-hidden="true"></div>
      <h2 id="victoryTitle">You cleared all words!</h2>
      <div class="victory-attempts">
        Attempts this round
        <span class="num" id="victoryAttempts">0</span>
      </div>
      <button type="button" class="btn" id="btnVictoryClose">Play again</button>
    </div>
  </div>

  <script>
    const PALETTE = [
      { id: "red", hex: "#ef5350", word: "RED" },
      { id: "blue", hex: "#42a5f5", word: "BLUE" },
      { id: "green", hex: "#66bb6a", word: "GREEN" },
      { id: "yellow", hex: "#ffee58", word: "YELLOW" },
      { id: "purple", hex: "#ab47bc", word: "PURPLE" },
      { id: "orange", hex: "#ffa726", word: "ORANGE" },
      { id: "pink", hex: "#f06292", word: "PINK" },
      { id: "brown", hex: "#8d6e63", word: "BROWN" },
      { id: "cyan", hex: "#26c6da", word: "CYAN" },
      { id: "lime", hex: "#d4e157", word: "LIME" },
      { id: "navy", hex: "#1e3a8a", word: "NAVY" },
      { id: "gold", hex: "#ffca28", word: "GOLD" },
      { id: "teal", hex: "#26a69a", word: "TEAL" },
      { id: "coral", hex: "#ff7043", word: "CORAL" },
      { id: "magenta", hex: "#ec407a", word: "MAGENTA" },
      { id: "lavender", hex: "#b39ddb", word: "LAVENDER" },
      { id: "mint", hex: "#69f0ae", word: "MINT" },
      { id: "peach", hex: "#ffccbc", word: "PEACH" },
      { id: "salmon", hex: "#fa8072", word: "SALMON" },
      { id: "olive", hex: "#9e9d24", word: "OLIVE" },
      { id: "maroon", hex: "#ad1457", word: "MAROON" },
      { id: "crimson", hex: "#e53935", word: "CRIMSON" },
      { id: "aqua", hex: "#18ffff", word: "AQUA" },
      { id: "indigo", hex: "#5c6bc0", word: "INDIGO" },
      { id: "violet", hex: "#7e57c2", word: "VIOLET" },
      { id: "beige", hex: "#d7ccc8", word: "BEIGE" },
      { id: "ivory", hex: "#fffff0", word: "IVORY" },
      { id: "slate", hex: "#78909c", word: "SLATE" },
      { id: "rose", hex: "#f48fb1", word: "ROSE" },
      { id: "plum", hex: "#8e24aa", word: "PLUM" },
      { id: "jade", hex: "#00bfa5", word: "JADE" },
      { id: "azure", hex: "#29b6f6", word: "AZURE" },
      { id: "ruby", hex: "#d32f2f", word: "RUBY" },
      { id: "sand", hex: "#ffe082", word: "SAND" },
      { id: "pine", hex: "#2e7d32", word: "PINE" },
      { id: "sky", hex: "#81d4fa", word: "SKY" },
      { id: "grape", hex: "#5e35b1", word: "GRAPE" },
      { id: "tan", hex: "#d7a574", word: "TAN" },
      { id: "bronze", hex: "#cd7f32", word: "BRONZE" },
      { id: "cherry", hex: "#c62828", word: "CHERRY" },
      { id: "lemon", hex: "#fff176", word: "LEMON" },
      { id: "emerald", hex: "#00c853", word: "EMERALD" },
      { id: "sapphire", hex: "#1565c0", word: "SAPPHIRE" },
      { id: "amber", hex: "#ff8f00", word: "AMBER" },
      { id: "turquoise", hex: "#40e0d0", word: "TURQUOISE" },
      { id: "lilac", hex: "#ce93d8", word: "LILAC" },
      { id: "apricot", hex: "#fbad7c", word: "APRICOT" },
      { id: "charcoal", hex: "#455a64", word: "CHARCOAL" },
    ];

    /** words = playable words; colors = total color tiles (must be > words); grid = cols * rows */
    const CONFIG = {
      easy: { cols: 4, rows: 4, words: 5, colors: 11 },
      hard: { cols: 6, rows: 6, words: 14, colors: 22 },
    };

    let difficulty = "easy";
    let tiles = [];
    let selectedIndex = null;
    let wordsRemaining = 0;
    let attempts = 0;
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const boardWrap = document.getElementById("boardWrap");
    const toastEl = document.getElementById("toast");
    const wordsLeftEl = document.getElementById("wordsLeft");
    const attemptsEl = document.getElementById("attempts");
    const victoryOverlay = document.getElementById("victoryOverlay");
    const victoryAttemptsEl = document.getElementById("victoryAttempts");
    const confettiEl = document.getElementById("confetti");

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandomSubset(list, n) {
      return shuffle(list).slice(0, n);
    }

    function buildRound() {
      closeVictory();
      gameOver = false;
      const cfg = CONFIG[difficulty];
      const totalSlots = cfg.cols * cfg.rows;
      const w = cfg.words;
      const c = cfg.colors;
      if (w + c !== totalSlots) {
        console.warn("words + colors must equal grid size");
      }
      const chosen = pickRandomSubset(PALETTE, w);
      const pairIds = new Set(chosen.map((x) => x.id));
      const notChosen = PALETTE.filter((p) => !pairIds.has(p.id));

      const list = [];

      for (const col of chosen) {
        list.push({
          kind: "word",
          pairId: col.id,
          hex: null,
          label: col.word,
          isDistractor: false,
        });
      }

      for (const col of chosen) {
        list.push({
          kind: "color",
          pairId: col.id,
          hex: col.hex,
          label: "",
          isDistractor: false,
        });
      }

      const extraColors = c - w;
      for (let i = 0; i < extraColors; i++) {
        if (Math.random() < 0.55 && chosen.length) {
          const col = chosen[Math.floor(Math.random() * chosen.length)];
          list.push({
            kind: "color",
            pairId: col.id,
            hex: col.hex,
            label: "",
            isDistractor: false,
          });
        } else if (notChosen.length) {
          const col = notChosen[Math.floor(Math.random() * notChosen.length)];
          list.push({
            kind: "color",
            pairId: null,
            hex: col.hex,
            label: "",
            isDistractor: true,
          });
        } else {
          const col = chosen[Math.floor(Math.random() * chosen.length)];
          list.push({
            kind: "color",
            pairId: col.id,
            hex: col.hex,
            label: "",
            isDistractor: false,
          });
        }
      }

      const shuffled = shuffle(list.slice(0, totalSlots));
      tiles = shuffled.map((t, i) => ({ ...t, index: i, cleared: false }));
      wordsRemaining = chosen.length;
      selectedIndex = null;
      attempts = 0;
      updateStats();
      renderBoard();
      setToast("", "");
    }

    function updateStats() {
      wordsLeftEl.textContent = String(wordsRemaining);
      attemptsEl.textContent = String(attempts);
    }

    function setToast(text, variant) {
      toastEl.textContent = text;
      toastEl.className = "toast" + (variant ? " " + variant : "");
    }

    function spawnConfetti() {
      confettiEl.innerHTML = "";
      const colors = ["#ff6b9d", "#5ecbff", "#ffd54f", "#a78bfa", "#69f0ae", "#ffa94d", "#7eb6ff"];
      const n = 42;
      for (let i = 0; i < n; i++) {
        const s = document.createElement("span");
        s.style.left = `${Math.random() * 100}%`;
        s.style.background = colors[i % colors.length];
        s.style.animationDuration = `${1.8 + Math.random() * 1.2}s`;
        s.style.animationDelay = `${Math.random() * 0.4}s`;
        confettiEl.appendChild(s);
      }
    }

    function showVictory() {
      gameOver = true;
      victoryAttemptsEl.textContent = String(attempts);
      spawnConfetti();
      victoryOverlay.classList.add("open");
      victoryOverlay.setAttribute("aria-hidden", "false");
      boardWrap.classList.add("dimmed");
    }

    function closeVictory() {
      victoryOverlay.classList.remove("open");
      victoryOverlay.setAttribute("aria-hidden", "true");
      boardWrap.classList.remove("dimmed");
      confettiEl.innerHTML = "";
    }

    function cellSizeForGrid(cols, rows) {
      const maxW = Math.min(520, window.innerWidth - 48);
      const maxH = window.innerHeight * 0.52;
      const gap = window.innerWidth <= 420 ? 6 : 8;
      const w = (maxW - (cols - 1) * gap) / cols;
      const h = (maxH - (rows - 1) * gap) / rows;
      return Math.max(40, Math.floor(Math.min(w, h)));
    }

    /** Shrink font (and allow wrap via CSS) until label fits inside the cell. */
    function fitWordLabel(btn) {
      const label = btn.querySelector(".word-label");
      if (!label) return;
      const pad = 10;
      const maxW = Math.max(8, btn.clientWidth - pad);
      const maxH = Math.max(8, btn.clientHeight - pad);
      label.style.width = maxW + "px";
      label.style.maxHeight = maxH + "px";
      label.style.overflow = "hidden";
      const text = label.textContent || "";
      let fs = Math.min(
        14,
        Math.max(6, Math.min(maxW / Math.max(2, text.length * 0.42), maxH / 1.8))
      );
      for (let step = 0; step < 60 && fs >= 4; step++) {
        label.style.fontSize = fs + "px";
        const overflowY = label.scrollHeight > maxH + 0.5;
        const overflowX = label.scrollWidth > maxW + 0.5;
        if (!overflowY && !overflowX) break;
        fs -= 0.5;
      }
    }

    function renderBoard() {
      const cfg = CONFIG[difficulty];
      const size = cellSizeForGrid(cfg.cols, cfg.rows);
      boardEl.style.setProperty("--cell", size + "px");
      boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, ${size}px)`;

      boardEl.innerHTML = "";
      tiles.forEach((tile, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "cell";
        btn.dataset.index = String(i);

        if (tile.cleared) {
          btn.classList.add("empty");
          btn.disabled = true;
          btn.setAttribute("aria-hidden", "true");
        } else {
          if (tile.kind === "color") {
            btn.style.background = tile.hex;
            btn.style.borderColor = "rgba(45, 49, 66, 0.2)";
            btn.setAttribute("aria-label", "Color tile");
          } else {
            btn.classList.add("word-tile");
            const lab = document.createElement("span");
            lab.className = "word-label";
            lab.textContent = tile.label;
            btn.appendChild(lab);
            btn.setAttribute("aria-label", `Word: ${tile.label}`);
          }
          if (selectedIndex === i) btn.classList.add("selected");
          btn.addEventListener("click", () => onCellClick(i));
        }
        boardEl.appendChild(btn);
      });

      requestAnimationFrame(() => {
        boardEl.querySelectorAll(".word-tile .word-label").forEach((lab) => {
          fitWordLabel(lab.closest("button"));
        });
      });
    }

    function onCellClick(index) {
      if (gameOver) return;
      const tile = tiles[index];
      if (!tile || tile.cleared) return;

      if (selectedIndex === null) {
        selectedIndex = index;
        renderBoard();
        setToast("Now tap the matching word.", "");
        return;
      }

      if (selectedIndex === index) {
        selectedIndex = null;
        renderBoard();
        setToast("Selection cleared.", "");
        return;
      }

      const a = tiles[selectedIndex];
      const b = tile;
      attempts += 1;
      updateStats();

      const colorTile = a.kind === "color" ? a : b.kind === "color" ? b : null;
      const wordTile = a.kind === "word" ? a : b.kind === "word" ? b : null;

      if (!colorTile || !wordTile) {
        flashWrong(selectedIndex, index);
        setToast("Pick one color tile and one word tile.", "err");
        return;
      }

      const wordOk = wordTile.pairId && !wordTile.isDistractor;
      const colorOk =
        !colorTile.isDistractor &&
        colorTile.pairId &&
        wordTile.pairId &&
        colorTile.pairId === wordTile.pairId;

      if (wordOk && colorOk) {
        tiles[selectedIndex].cleared = true;
        tiles[index].cleared = true;
        wordsRemaining -= 1;
        selectedIndex = null;
        updateStats();
        renderBoard();
        if (wordsRemaining <= 0) {
          setToast("", "");
          showVictory();
        } else {
          setToast("Nice! Word cleared.", "ok");
        }
        return;
      }

      flashWrong(selectedIndex, index);
      setToast("No match—try again.", "err");
    }

    function flashWrong(i, j) {
      selectedIndex = null;
      renderBoard();
      requestAnimationFrame(() => {
        [i, j].forEach((idx) => {
          const el = boardEl.querySelector(`button[data-index="${idx}"]`);
          if (el && tiles[idx] && !tiles[idx].cleared) {
            el.classList.add("shake");
            el.addEventListener(
              "animationend",
              () => el.classList.remove("shake"),
              { once: true }
            );
          }
        });
      });
    }

    document.getElementById("btnNew").addEventListener("click", buildRound);

    document.getElementById("btnVictoryClose").addEventListener("click", buildRound);

    victoryOverlay.addEventListener("click", (e) => {
      if (e.target === victoryOverlay) closeVictory();
    });

    document.getElementById("diffEasy").addEventListener("click", () => {
      difficulty = "easy";
      document.getElementById("diffEasy").classList.add("active");
      document.getElementById("diffHard").classList.remove("active");
      buildRound();
    });

    document.getElementById("diffHard").addEventListener("click", () => {
      difficulty = "hard";
      document.getElementById("diffHard").classList.add("active");
      document.getElementById("diffEasy").classList.remove("active");
      buildRound();
    });

    window.addEventListener("resize", () => {
      if (tiles.length) renderBoard();
    });

    buildRound();
  </script>
</body>
</html>
